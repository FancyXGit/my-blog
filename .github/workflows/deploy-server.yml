name: Deploy Blog To Server

on:
  push:
    branches:
      - main
      - master
    paths:
      - "src/content/**"
      - "src/assets/**"
      - "public/**"
      - "src/site.config.ts"
      - "astro.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch:

concurrency:
  group: deploy-blog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Sync and Build on Server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          SERVER_PATH: ${{ secrets.SERVER_PATH }}
          SERVER_WEB_ROOT: ${{ secrets.SERVER_WEB_ROOT }}
          RESTART_CMD: ${{ secrets.RESTART_CMD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: BRANCH_NAME,SERVER_PATH,SERVER_WEB_ROOT,RESTART_CMD
          script_stop: true
          script: |
            set -e

            if [ -z "$SERVER_PATH" ]; then
              echo "SERVER_PATH is empty."
              exit 1
            fi

            cd "$SERVER_PATH"

            if [ ! -d .git ]; then
              echo "No git repo found in SERVER_PATH: $SERVER_PATH"
              exit 1
            fi

            git fetch --all --prune

            if git show-ref --verify --quiet "refs/heads/$BRANCH_NAME"; then
              git checkout "$BRANCH_NAME"
            else
              git checkout -b "$BRANCH_NAME" "origin/$BRANCH_NAME"
            fi

            git pull --ff-only origin "$BRANCH_NAME"

            # Prevent stale content routes after deleting markdown files.
            rm -rf .astro node_modules/.astro dist

            run_pnpm() {
              if command -v pnpm >/dev/null 2>&1; then
                pnpm "$@"
              elif command -v corepack >/dev/null 2>&1; then
                corepack pnpm "$@"
              else
                echo "Neither pnpm nor corepack is available on server."
                exit 1
              fi
            }

            run_pnpm install --frozen-lockfile
            run_pnpm build

            if [ -n "$SERVER_WEB_ROOT" ]; then
              if [ "$SERVER_WEB_ROOT" = "/" ]; then
                echo "Refusing to deploy to root directory /."
                exit 1
              fi

              rm -rf "$SERVER_WEB_ROOT"/*
              cp -a dist/. "$SERVER_WEB_ROOT"/
            fi

            if [ -n "$RESTART_CMD" ]; then
              sh -lc "$RESTART_CMD"
            fi
